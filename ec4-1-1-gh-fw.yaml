substitutions:
  name: "ec4-1-1-gh"
  friendly_name: "ec4-1-1-gh"

esphome:
  name: "ec4-1-1-gh"
  min_version: 2023.11.0
  platformio_options:
    #board_build.partitions: partitions_no_ota.csv
    board_build.flash_mode: dio
  on_boot:
    - priority: -100
      then:
        - light.turn_on:
            id: led_ring
            effect: power
        - delay: 1s
        - wait_until:
            condition:
              wifi.connected:
        - light.turn_on:
            id: led_ring
            effect: Working
            red: 0%
            blue: 100%
            green: 0%
        - wait_until:
            condition:
              api.connected:
        - delay: 1.5s
        - if:
            condition:
              lambda: return id(wake_word_engine_location).state == "On device";
            then:
              - logger.log: "Starting 'On device' mode"
              - micro_wake_word.start:
            else:
              - logger.log: "Starting 'In Home Assistant' mode"
              - voice_assistant.start_continuous:
        - script.execute: reset_led
        - output.turn_on: pa_ctrl

esp32:
  board: esp32dev
  flash_size: 16MB
  partitions: partitions.csv
  framework:
    type: esp-idf
    version: 4.4.8
    platform_version: 5.4.0
    sdkconfig_options:
      CONFIG_FREERTOS_MAX_TASK_NAME_LEN: "16"
      CONFIG_LOG_MAXIMUM_LEVEL: "3"
      CONFIG_FREERTOS_NUMBER_OF_CORES: "2"
      CONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ: "160"
      CONFIG_ESP32_WIFI_IRAM_OPT: "y"
      CONFIG_ESP32_WIFI_RX_IRAM_OPT: "y"
      CONFIG_I2S_ISR_IRAM_LEVEL: "3"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_SYSTEM_EVENT_TASK_STACK_SIZE: "4096"
      CONFIG_ESP32_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_BOOT_INIT: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"

