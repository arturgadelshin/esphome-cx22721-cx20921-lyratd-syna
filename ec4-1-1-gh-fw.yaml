microphone:
  - platform: cx_i2s
    id: external_mic
    mic_gain: 0.0 # 0,3,6,9,12,15,18,21,24,27,30 #15норм
    cx_audio_id: my_cx_audio

media_player:
  - platform: speaker
    name: "Speaker Media Player"
    id: speaker_media_player_id
    #internal: False
    volume_increment: 0.05
    volume_min: 0.4
    volume_max: 0.85
    #buffer_size: 2000000
    
    #task_stack_in_psram: true
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      num_channels: "2"  # Обязательно в кавычках
      format: WAV     # FLAC is the least processor intensive codec
      sample_rate: 48000

    media_pipeline:
      speaker: media_resampling_speaker
      num_channels: "2"  # Обязательно в кавычках
      format: WAV     # FLAC is the least processor intensive codec
      sample_rate: 48000

    files:
      - id: wake_sound_file
        file: https://github.com/arturgadelshin/sound_ai_home/raw/main/sounds/awake_2.wav
      - id: error_sound_file
        file: https://github.com/arturgadelshin/sound_ai_home/raw/main/sounds/error_3.wav

    on_state: # Было до 01.10.25
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing:
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixing_input
                decibel_reduction: 0
                duration: 0.5s
     
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20 # Приглушить
          duration: 0.0s
      #- microphone.mute: external_mic

# =============== MICRO WAKE WORD ===============
micro_wake_word:
  id: mww
  #stop_after_detection: false
  models:
    - model: https://raw.githubusercontent.com/arturgadelshin/wakeword_miluy_dom/refs/heads/main/stream_state_internal_quant.json
      id: muliy_dom
  vad:
    #probability_cutoff: 0.05
  on_wake_word_detected:
    - media_player.speaker.play_on_device_media_file:
        media_file: wake_sound_file
        announcement: true
    - wait_until:
        not:
          - media_player.is_announcing:
    - delay: 150ms
    #- microphone.unmute: external_mic
    - voice_assistant.start:
        wake_word: !lambda return wake_word;


# =============== VOICE ASSISTANT ===============
voice_assistant:
  id: voice_asst
  microphone: external_mic
  micro_wake_word: mww
  media_player: speaker_media_player_id
  noise_suppression_level: 4 # Оставил 4 пока что
  auto_gain: 5dBFS # Было 31 31dBFS 
  volume_multiplier: 1.0 #25.0
  on_wake_word_detected:
    - media_player.speaker.play_on_device_media_file:
        media_file: wake_sound_file
        announcement: true
    # - wait_until:
    #     not:
    #    - delay: 200ms
    #- microphone.unmute: external_mic
  on_idle:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 0.0s  

  on_start:
    - if:
        condition:
          lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - micro_wake_word.stop:
    #- delay: 200ms
    #- microphone.unmute: external_mic

  on_listening:
    - light.turn_on:
        id: led_ring
        blue: 80%
        red: 80%
        green: 80%
        brightness: 80%
        effect: wakeword
   
  on_tts_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20
        duration: 0.0s
    #- delay: 200ms

  on_tts_end:
    - wait_until:
        not:
          speaker.is_playing:
            id: external_speaker
    - delay: 100ms
    #- microphone.unmute: external_mic


  on_end:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 0.0s
    - if:
        condition:
          lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - micro_wake_word.start:
          - script.execute: reset_led
        else:
          - script.execute: reset_led
    #- microphone.unmute: external_mic

  on_error:
    - light.turn_on:
        id: led_ring
        blue: 0%
        red: 100%
        green: 0%
        brightness: 80%
        effect: none
    - media_player.speaker.play_on_device_media_file:
        media_file: error_sound_file
        announcement: true
    - wait_until:
        not:
          - media_player.is_announcing:
    - delay: 100ms
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 0.5s
    - media_player.play: speaker_media_player_id
    - delay: 0.5s
    #- microphone.unmute: external_mic
    - script.execute: reset_led

# =============== SCRIPTS ===============
script:
  - id: reset_led
    mode: restart
    then:
      - delay: 50ms
      - if:
          condition:
            switch.is_on: night_mode
          then:
            - light.turn_on:
                id: led_ring
                blue: 100%
                red: 0%
                green: 0%
                brightness: 30%
                effect: none
          else:
            - light.turn_on:
                id: led_ring
                blue: 100%
                red: 0%
                green: 0%
                brightness: 80%
                effect: none



# =============== SWITCHES ===============
switch:
  - platform: template
    name: Night Mode Switch
    id: night_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_on:
      - script.execute: reset_led
    on_turn_off:
      - script.execute: reset_led

  - platform: template
    name: Amp AMP
    id: amp_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_on:
      - output.turn_on: pa_ctrl
    on_turn_off:
      - output.turn_off: pa_ctrl

  - platform: template
    name: Mute DAC
    id: dac_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_on:
      - output.turn_on: dac_ctrl
    on_turn_off:
      - output.turn_off: dac_ctrl

  - platform: template
    name: Reset DSP
    id: reset_dsp_cx
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_on:
      - output.turn_on: reset_dsp
    on_turn_off:
      - output.turn_off: reset_dsp

# =============== LIGHT ===============
light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    name: "${friendly_name} Light"
    pin: GPIO27
    num_leds: 24
    rmt_channel: 2  # Добавлено - канал RMT от 0 до 7
    rgb_order: GRB
    chipset: ws2812
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
      - addressable_twinkle:
          name: "Working"
          twinkle_probability: 80%
          progress_interval: 50ms
      - addressable_color_wipe:
          name: "Wakeword"
          colors:
            - red: 0%
              green: 100%
              blue: 0%
              num_leds: 12
          add_led_interval: 40ms
          reverse: false
      - addressable_color_wipe:
          name: "Power"
          colors:
            - red: 100%
              green: 0%
              blue: 0%
              num_leds: 12
          add_led_interval: 50ms
          reverse: false


# =============== BINARY SENSORS ===============
binary_sensor:
  # Audio Jack Plugged sensor
  - platform: gpio
    id: jack_plugged
    # Debouncing it a bit because it can be activated back and forth as you plug the audio jack
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    pin:
      number: GPIO21 # PJ_DET
    # When the jack is plugged in:
    on_press:
      - lambda: id(jack_plugged_recently) = true;
      - delay: 200ms
      - lambda: id(jack_plugged_recently) = false;
    # When the jack is unplugged:
    on_release:
      - lambda: id(jack_unplugged_recently) = true;
      - delay: 200ms
      - lambda: id(jack_unplugged_recently) = false;


# =============== GLOBALS ===============
globals:
  # Global variable tracking if the jack has been plugged touched.
  - id: jack_plugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the jack has been unplugged touched.
  - id: jack_unplugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'


# =============== SENSOR ===============
sensor:
  - platform: sound_level
    passive: True
    microphone: external_mic
    #duration_measurement: 150
    peak:
      name: "Peak Loudness"
    # rms:
    #   name: "Average Loudness"

  - platform: uptime
    type: seconds
    name: "Uptime Sensor"

  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal, dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal, %"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

