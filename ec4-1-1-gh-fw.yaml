speaker:
  - platform: cx_i2s
    id: external_speaker
    cx_audio_id: my_cx_audio
    sample_rate: "48000"
    num_channels: "2"

  - id: mixing_speaker
    platform: mixer
    output_speaker: external_speaker
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input
    num_channels: "2"  #

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000 
    num_channels: "2"   # Рекомендуется также добавить здесь для ясности
    
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000 
    num_channels: "2"   # Рекомендуется также добавить здесь для ясности

